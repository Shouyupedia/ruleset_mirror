name: jsDelivr Purge Cache

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: jsdelivr-purge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  purge:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Purge jsDelivr Cache
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --retry 3 \
            "https://purge.jsdelivr.net/gh/${{ github.repository }}@main/"
