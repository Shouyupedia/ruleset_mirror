name: prune-orphan-files

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "list or delete"
        required: true
        default: "list"
        type: choice
        options:
          - list
          - delete
      path_prefix:
        description: "Only prune under this prefix (e.g., List/). Empty = whole repo"
        required: false
        default: "List/"

permissions:
  contents: write

concurrency:
  group: repository-write-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prune:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      UPSTREAM: https://github.com/SukkaLab/ruleset.skk.moe.git
      UPSTREAM_BRANCH: master

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fetch upstream
        run: |
          set -euo pipefail
          git remote add upstream "${UPSTREAM}" 2>/dev/null || true
          git fetch --depth=1 upstream "${UPSTREAM_BRANCH}" --prune

      - name: Find orphan files (exist in mirror but not in upstream)
        id: find
        run: |
          set -euo pipefail
          BASE="$(git rev-parse HEAD)"
          NEW="$(git rev-parse upstream/${UPSTREAM_BRANCH})"
          echo "BASE=$BASE" >> "$GITHUB_OUTPUT"
          echo "NEW=$NEW" >> "$GITHUB_OUTPUT"

          prefix="${{ github.event.inputs.path_prefix }}"
          mode="${{ github.event.inputs.mode }}"
          case "$mode" in
            list|delete) ;;
            *) echo "Unsupported mode: $mode" >&2; exit 2 ;;
          esac

          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT
          local_files="$tmp_dir/local-files.txt"
          upstream_files="$tmp_dir/upstream-files.txt"
          orphan_file="$tmp_dir/orphan.txt"

          # A workflow checkout is clean, so tracked files are the complete and
          # fastest source of local candidates. Keep mirror metadata out.
          git ls-files | while IFS= read -r path; do
            case "$path" in
              .github/*|.gitattributes|.gitignore|README.md|LICENSE|deploy-check*.txt|*.mrs|*.srs) continue ;;
            esac
            if [[ -z "$prefix" || "$path" == "$prefix"* ]]; then
              printf '%s\n' "$path"
            fi
          done > "$local_files"

          git ls-tree -r --name-only "$NEW" | while IFS= read -r path; do
            if [[ -z "$prefix" || "$path" == "$prefix"* ]]; then
              printf '%s\n' "$path"
            fi
          done > "$upstream_files"

          # local - upstream = orphan
          comm -23 <(sort "$local_files") <(sort "$upstream_files") > "$orphan_file" || true

          echo "Orphan count: $(wc -l < "$orphan_file")"
          {
            echo "## Orphan files (local exists, upstream missing)"
            echo ""
            echo "- Base: \`$BASE\`"
            echo "- Upstream: \`$NEW\`"
            echo "- Prefix: \`${prefix}\`"
            echo "- Count: $(wc -l < "$orphan_file")"
            echo ""
            echo "### List"
            echo ""
            if [[ -s "$orphan_file" ]]; then
              sed 's/^/- `/' "$orphan_file" | sed 's/$/`/'
            else
              echo "(none)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$mode" == "delete" && -s "$orphan_file" ]]; then
            while IFS= read -r file; do
              rm -f "$file"
            done < "$orphan_file"
          fi

      - name: Commit deletions
        if: github.event.inputs.mode == 'delete'
        run: |
          set -euo pipefail
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No deletions to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: prune orphan files"
          git push origin "${{ github.ref_name }}"
